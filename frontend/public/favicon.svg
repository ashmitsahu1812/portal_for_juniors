<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60">
  <style>
    .re { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 48px; font-weight: bold; fill: #007bff; }
    .start { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 48px; font-weight: normal; fill: #000000; letter-spacing: -1px; }
    @media (prefers-color-scheme: dark) {
      .start { fill: #ffffff; }
    }
  </style>
  <text x="5" y="45">
    <tspan class="re">RE</tspan><tspan class="start">start</tspan>
  </text>
</svg>